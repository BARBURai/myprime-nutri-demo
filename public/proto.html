<!doctype html>
<html lang="he" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>פרוטוטייפ - מודול התוכן MyPrime</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF3F4;--panel:#FFFFFF;--ink:#3A2B30;--sub:#8B737A;--faint:#BBA7AC;--line:#F1E4E7;--brand:#D45D79;--brandD:#A8425C;--brandBg:#FBE9EE;--macroP:#7E4FB5;--proteinTrack:#EBE1F7;--amber:#C77A3C;--amberBg:#FBEEDF;--water:#7E8DD6;--waterBg:#EBEDF8;--info:#9C6BA6;--infoBg:#F2E7F3;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Rubik',system-ui,sans-serif;background:#ECE1E4;color:var(--ink);-webkit-font-smoothing:antialiased;}
.phone{max-width:412px;margin:0 auto;background:var(--bg);min-height:100vh;}
.screen{display:none;} .screen.active{display:block;}
.strip{display:flex;gap:6px;padding:14px 16px 8px;overflow:hidden;}
.chip{flex:0 0 auto;width:50px;border-radius:12px;text-align:center;overflow:hidden;border:2px solid transparent;background:var(--bg);}
.chip .dow{font-size:13px;opacity:.85;padding-top:7px;}.chip .dt{font-size:16px;font-weight:700;}
.chip .bar{height:4px;margin:5px 6px 7px;border-radius:3px;background:var(--line);position:relative;overflow:hidden;}
.chip .bar>i{position:absolute;top:0;right:0;bottom:0;border-radius:3px;background:#D81B7A;}
.chip.today{background:var(--brandBg);border-color:var(--brand);}.chip.sel{background:var(--brand);color:#fff;}
.chip.sel .bar{background:rgba(255,255,255,.35);}.chip.sel .bar>i{background:#fff;}
.chip .tag{background:var(--brand);color:#fff;font-size:10px;font-weight:700;padding:2px 0;}.chip.sel .tag{background:var(--brandD);}
.chip .pad{padding:6px 0;}
.contentBtnWrap{margin:1px 16px 7px;display:flex;}
.contentBtn{margin-inline-start:auto;display:inline-flex;align-items:center;gap:6px;background:var(--brandBg);border:1px solid var(--brand);color:var(--brandD);border-radius:999px;padding:6px 14px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;}
.rings{display:grid;grid-template-columns:1fr 1fr;justify-items:center;row-gap:10px;column-gap:6px;padding:0 16px;}
.ringBox{position:relative;width:124px;height:124px;}
.plus{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.18);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:600;}
.hint{text-align:center;color:var(--faint);font-size:12px;padding:14px;}
.topbar{position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:11px 12px;z-index:10;}
.topbar h1{font-size:17px;font-weight:700;margin:0;flex:1;}
.backbtn{display:inline-flex;align-items:center;gap:4px;background:var(--brandBg);border:1px solid var(--brand);color:var(--brandD);border-radius:999px;padding:6px 13px 6px 11px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;flex:0 0 auto;}
.backbtn svg{width:17px;height:17px;}
#searchInput{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;font-size:15px;font-family:inherit;outline:none;color:var(--ink);}
.content{padding:14px 14px 92px;}
.todayHero{background:linear-gradient(135deg,#D45D79,#A8425C);color:#fff;border-radius:18px;padding:14px 17px;margin-bottom:8px;box-shadow:0 6px 16px rgba(168,66,92,.25);}
.heroTitle{font-size:18px;font-weight:700;margin:0 0 3px;}
.heroTheme{font-size:12.5px;opacity:.9;margin-bottom:8px;}
.todayHero .prog{font-size:12.5px;opacity:.95;display:flex;align-items:center;gap:8px;}
.todayHero .pbar{flex:1;height:6px;background:rgba(255,255,255,.3);border-radius:4px;overflow:hidden;}
.todayHero .pbar>i{display:block;height:6px;background:#fff;border-radius:4px;}
.todayList{background:var(--panel);border:1px solid var(--line);border-radius:0 0 16px 16px;margin:-12px 6px 18px;padding:8px 10px 4px;box-shadow:0 4px 12px rgba(0,0,0,.04);}
.listcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:4px 10px;}
.progHeader{display:flex;align-items:center;gap:8px;margin:12px 2px 12px;}
.progTitle{font-size:20px;font-weight:700;color:var(--ink);margin:0;flex:1;}
.progActs{display:flex;gap:7px;flex:0 0 auto;}
.progAct{display:inline-flex;align-items:center;gap:4px;background:var(--brandBg);border:1px solid var(--line);color:var(--brandD);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.progAct svg{width:15px;height:15px;}
.filterchips,.weekpills{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;}
.filterchips button{flex:0 0 auto;border:1.5px solid var(--line);background:var(--panel);color:var(--sub);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;}
.filterchips button.on{background:var(--ink);border-color:var(--ink);color:#fff;}
.weekpills button{flex:0 0 auto;border:1.5px solid var(--line);background:var(--panel);color:var(--sub);border-radius:999px;padding:6px 15px;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;}
.weekpills button.on{background:var(--brand);border-color:var(--brand);color:#fff;}
.daycard{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;background:var(--panel);}
.dayhead{display:flex;align-items:center;gap:11px;padding:13px 13px;cursor:pointer;}
.dayhead .num{width:36px;height:36px;border-radius:11px;background:var(--brandBg);color:var(--brandD);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:12.5px;flex:0 0 auto;text-align:center;line-height:1.1;}
.dayhead .tt{flex:1;}.dayhead .tt b{display:block;font-size:14.5px;color:var(--ink);line-height:1.3;}.dayhead .tt span{font-size:12px;color:var(--sub);}
.dayhead .badge{font-size:11px;font-weight:700;background:var(--brand);color:#fff;border-radius:999px;padding:2px 9px;flex:0 0 auto;}
.daychev{width:19px;height:19px;color:var(--faint);flex:0 0 auto;transition:transform .2s;}
.daycard.open .daychev{transform:rotate(180deg);}
.daybody{border-top:1px solid var(--line);padding:4px 10px 8px;}
.lessonrow{display:flex;align-items:center;gap:11px;padding:11px 6px;border-bottom:1px solid #F6EEF0;cursor:pointer;}
.lessonrow:last-child{border-bottom:none;}
.lessonrow .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}.lessonrow .ic svg{width:20px;height:20px;}
.lessonrow .body{flex:1;min-width:0;}.lessonrow .body b{font-size:14px;font-weight:600;color:var(--ink);display:block;line-height:1.35;}.lessonrow .body span{font-size:11.5px;color:var(--sub);}
.lessonrow .st{flex:0 0 auto;display:flex;align-items:center;gap:2px;}
.check{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;color:#fff;}.check.on{background:var(--brand);border-color:var(--brand);}
.heartbtn{background:none;border:none;cursor:pointer;padding:3px;color:var(--faint);display:flex;}.heartbtn.on{color:var(--brand);}
.empty{text-align:center;color:var(--faint);padding:54px 24px;font-size:14px;line-height:1.7;}
.lesson{padding:16px 16px 92px;}
.lmeta{font-size:13px;color:var(--sub);margin-bottom:12px;}
.lactions{display:flex;gap:10px;margin-bottom:18px;}
.lactions button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;border-radius:12px;padding:11px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid var(--line);background:var(--panel);color:var(--ink);}
.lactions .complete.on{background:var(--brand);border-color:var(--brand);color:#fff;}.lactions .fav.on{color:var(--brand);border-color:var(--brand);}
.introtext{background:var(--bg);border-radius:14px;padding:15px 16px;font-size:15px;line-height:1.7;color:var(--ink);margin-bottom:18px;}
.introtext .tag{display:inline-block;font-size:10px;font-weight:700;color:var(--brandD);background:var(--brandBg);border-radius:6px;padding:2px 7px;margin-bottom:9px;}
.videobox{position:relative;width:240px;max-width:78%;margin:0 auto 10px;aspect-ratio:9/16;background:#1a1416;border-radius:16px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.22);}
.vtop{position:absolute;top:0;left:0;right:0;display:flex;gap:16px;padding:11px 13px;z-index:2;}
.vtop button{background:none;border:none;color:#fff;cursor:pointer;padding:0;display:flex;}
.vtop svg{width:18px;height:18px;}
.vcenter{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:20px;}
.vcenter .sk{position:relative;color:#fff;cursor:pointer;display:flex;}
.vcenter .sk svg{width:30px;height:30px;}
.vcenter .sk span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;}
.vcenter .pp{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#1a1416;}
.vcenter .pp svg{width:24px;height:24px;}
.vbottom{position:absolute;left:0;right:0;bottom:0;padding:9px 13px 11px;z-index:2;}
.vprog{height:3px;background:rgba(255,255,255,.3);border-radius:2px;position:relative;margin-bottom:6px;}
.vprog>i{position:absolute;top:0;bottom:0;right:0;width:6%;background:#fff;border-radius:2px;}
.vprog>b{position:absolute;top:50%;right:6%;width:11px;height:11px;border-radius:50%;background:#fff;transform:translate(50%,-50%);}
.vtime{font-size:10.5px;color:rgba(255,255,255,.9);text-align:right;}
.vcaps{font-size:11.5px;color:var(--sub);background:var(--bg);border-radius:10px;padding:9px 12px;margin:0 auto 18px;line-height:1.55;text-align:center;}
.dl{display:flex;align-items:center;gap:11px;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:18px;cursor:pointer;}
.dl .ic{width:38px;height:38px;border-radius:10px;background:var(--waterBg);color:var(--water);display:flex;align-items:center;justify-content:center;}.dl .ic svg{width:20px;height:20px;}.dl b{font-size:14px;color:var(--ink);display:block;}.dl span{font-size:11.5px;color:var(--sub);}
.upnext .lbl{font-size:13px;font-weight:700;color:var(--sub);margin:6px 0 9px;}
.upnextcard{display:flex;align-items:center;gap:11px;background:var(--bg);border-radius:13px;padding:12px 14px;cursor:pointer;}
.upnextcard .ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}.upnextcard .ic svg{width:18px;height:18px;}.upnextcard b{font-size:13.5px;color:var(--ink);display:block;}.upnextcard span{font-size:11.5px;color:var(--sub);}
.note{background:var(--infoBg);color:var(--info);font-size:12.5px;border-radius:10px;padding:9px 12px;margin-top:14px;text-align:center;}
#screen-day{padding-bottom:92px;}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:412px;display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--line);background:var(--brandBg);box-shadow:0 -2px 12px rgba(168,66,92,.10);padding:9px 4px;z-index:50;}
.navtab{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:var(--sub);cursor:pointer;padding:5px 12px;border-radius:14px;font-family:inherit;font-weight:400;font-size:13px;}
.navtab svg{width:20px;height:20px;}.navtab.on{background:var(--brand);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(168,66,92,.35);}
.navfab{flex-shrink:0;margin-top:-30px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brandD));color:#fff;border:3px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}.navfab svg{width:28px;height:28px;}
.devnote{background:var(--amberBg);color:var(--amber);font-size:12px;border-radius:10px;padding:9px 12px;margin:2px 2px 14px;line-height:1.55;}
</style></head>
<body>
<div id="nojs" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#FAF3F4;color:#3A2B30;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;font-family:'Rubik',system-ui,sans-serif;line-height:1.7;">
  <div style="font-size:40px;margin-bottom:14px;">🌸</div>

  <div style="font-size:15px;color:#8B737A;max-width:300px;">נראה שנפתח בתצוגה המקדימה של האייפון, והיא לא מריצה את התצוגה. לחצי על אייקון השיתוף, גללי ובחרי "פתח ב-Safari" (Open in Safari). או פתחי קודם את ספארי ואז את הקובץ.</div>
</div>
<div class="phone">

<div id="screen-day" class="screen active">
  <div class="strip" id="dayStrip"></div>
  <div class="contentBtnWrap"><button class="contentBtn" onclick="show('content')"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> התוכן של היום</button></div>

<div id="screen-fav" class="screen">

</div>
<div id="screen-search" class="screen">
  <div class="topbar"><input id="searchInput" placeholder="חיפוש שיעור..." oninput="renderSearch()"><button class="backbtn" onclick="show('content')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.42-1.41L7.83 13H20z"/></svg> חזרה</button></div>

</div>

</div>

<div class="bottomnav">

  <button class="navtab" onclick="show('day')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5zM10.5 5h3v14h-3zM16 11h3v8h-3z"/></svg>דוח</button>
  <button class="navfab" onclick="show('day')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg></button>
  <button class="navtab" onclick="show('day')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 21h10v-2H7v2zm12-9a4 4 0 00-3-3.9 4 4 0 00-8 0A4 4 0 005 12a3.5 3.5 0 003 3.46V17h8v-1.54A3.5 3.5 0 0019 12z"/></svg>מתכונים</button>
  <button class="navtab" onclick="show('day')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 10-5-5 5 5 0 005 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>פרופיל</button>
</div>

<script>

 const R=[{v:'צרכת',b:'850',l:'קלוריות',s:'מתוך 1,432',c:'--brand',t:'--line',f:.59,p:'--brand'},{v:'צעדת',b:'6,200',l:'צעדים',s:'מתוך 8,000',c:'--amber',t:'--amberBg',f:.78,p:'--amber'},{v:'צרכת',b:'45',u:'ג׳',l:'חלבון',s:'מתוך 90',c:'--macroP',t:'--proteinTrack',f:.5},{v:'שתית',b:'5',l:'כוסות מים',s:'1,250 מ"ל מתוך 8',c:'--water',t:'--waterBg',f:.6,p:'--water'}];
 const pos=[[1,1],[2,1],[1,2],[2,2]];
 document.getElementById('dayRings').innerHTML=R.map((d,i)=>{const r=54,circ=2*Math.PI*r,off=circ*(1-d.f);return '<div class="ringBox" style="grid-column:'+pos[i][0]+';grid-row:'+pos[i][1]+'"><svg width="124" height="124" viewBox="0 0 132 132"><circle cx="66" cy="66" r="54" fill="none" stroke="'+cv(d.t)+'" stroke-width="10"/><circle cx="66" cy="66" r="54" fill="none" stroke="'+cv(d.c)+'" stroke-width="10" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" transform="rotate(-90 66 66)"/><text x="66" y="40" text-anchor="middle" font-size="12.5" font-weight="600" fill="'+cv('--sub')+'">'+d.v+'</text><text x="66" y="64" text-anchor="middle" font-size="26" font-weight="700" fill="'+cv('--ink')+'">'+d.b+(d.u?'<tspan font-size="14" fill="'+cv('--sub')+'"> '+d.u+'</tspan>':'')+'</text><text x="66" y="83" text-anchor="middle" font-size="14.5" font-weight="700" fill="'+cv(d.c)+'">'+d.l+'</text><text x="66" y="97" text-anchor="middle" font-size="11" fill="'+cv('--sub')+'">'+d.s+'</text></svg>'+(d.p?'<div class="plus" style="background:'+cv(d.p)+'">+</div>':'')+'</div>';}).join('');
 const chips=[{dow:'שבת',dt:'6/6',pct:1},{dow:'ראשון',dt:'7/6',pct:.7},{dow:'שני',dt:'8/6',today:true,sel:true,pct:.4},{dow:'שלישי',dt:'9/6',pct:0},{dow:'רביעי',dt:'10/6',pct:0}];
 document.getElementById('dayStrip').innerHTML=chips.map(c=>'<div class="chip'+(c.today?' today':'')+(c.sel?' sel':'')+'">'+(c.today?'<div class="tag">היום</div>':'')+'<div class="pad"><div class="dow">'+c.dow+'</div><div class="dt">'+c.dt+'</div><div class="bar">'+(c.pct>0?'<i style="width:'+Math.round(c.pct*100)+'%"></i>':'')+'</div></div></div>').join('');
}
function row(wn,di,li,l,loc){const tp=TYPE[l.type]||TYPE.video;const done=completed.has(key(wn,di,li));const isf=fav.has(key(wn,di,li));const meta=loc?('שבוע '+wn+' יום '+wk(wn).days[di].day+' · '+tp.l):(tp.l+(l.hasPdf&&l.type!=='pdf'?' · כולל דף להורדה':''));
 return '<div class="lessonrow" onclick="openLesson('+wn+','+di+','+li+')"><div class="ic" style="background:'+cv(tp.b)+';color:'+cv(tp.c)+'">'+svg(ICON[l.type]||ICON.video)+'</div><div class="body"><b>'+l.title+'</b><span>'+meta+'</span></div><div class="st"><button class="heartbtn'+(isf?' on':'')+'" onclick="event.stopPropagation();togFav('+wn+','+di+','+li+')">'+svg(HEART,19)+'</button><div class="check'+(done?' on':'')+'">'+(done?svg('M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z',14):'')+'</div></div></div>';}

function renderContent(){
 const td=wk(curWeek).days[curDi];const tp=dayProg(curWeek,curDi);
 let h='<div class="todayHero"><div class="heroTitle">התוכן של היום · שבוע '+curWeek+' יום '+td.day+'</div><div class="heroTheme">'+td.theme+'</div><div class="prog"><span>'+tp.c+'/'+tp.t+' הושלמו</span><div class="pbar"><i style="width:'+(tp.t?Math.round(tp.c/tp.t*100):0)+'%"></i></div></div></div>';
 h+='<div class="todayList">'+td.lessons.map((l,li)=>row(curWeek,curDi,li,l)).join('')+'</div>';
 h+='<div class="devnote">\ud83d\udd27 גרסת פיתוח - כל הימים פתוחים לבנייה ובדיקה. באפליקציה בפועל התוכן נפתח יום אחרי יום (דריפ).</div>'+'<div class="progHeader"><h2 class="progTitle">כל התוכנית</h2><div class="progActs"><button class="progAct" onclick="show(\'search\')">'+svg(SEARCH,15)+' חיפוש</button><button class="progAct" onclick="show(\'fav\')">'+svg(HEART,15)+' המועדפים שלי</button></div></div>';
 const FILTERS=[['all','הכל'],['workout','אימונים'],['task','משימות'],['video','סרטונים'],['pdf','דפים']];
 h+='<div class="filterchips">'+FILTERS.map(f=>'<button class="'+(filter===f[0]?'on':'')+'" onclick="filter=\''+f[0]+'\';renderContent()">'+f[1]+'</button>').join('')+'</div>';
 if(filter==='all'){
   h+='<div class="weekpills">'+DATA.map(w=>'<button class="'+(w.week===selWeek?'on':'')+'" onclick="selWeek='+w.week+';renderContent()">שבוע '+w.week+'</button>').join('')+'</div>';
   const days=wk(selWeek).days.map((d,di)=>({d,di}));
   const chev='<svg class="daychev" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>';
   h+=days.map(o=>{const d=o.d,di=o.di;const isToday=(selWeek===curWeek&&di===curDi);const pr=dayProg(selWeek,di);
     return '<div class="daycard'+(isToday?' open':'')+'"><div class="dayhead" onclick="toggleDay(this)"><div class="num">יום<br>'+d.day+'</div><div class="tt"><b>'+d.theme+'</b><span>'+pr.c+'/'+pr.t+' הושלמו</span></div>'+(isToday?'<div class="badge">היום</div>':'')+chev+'</div><div class="daybody" style="display:'+(isToday?'block':'none')+'">'+d.lessons.map((l,li)=>row(selWeek,di,li,l)).join('')+'</div></div>';}).join('');
 } else {
   const fl=flatAll().filter(x=>x.l.type===filter);
   h+= fl.length? '<div class="listcard">'+fl.map(x=>row(x.wn,x.di,x.li,x.l,true)).join('')+'</div>' : '<div class="empty">אין פריטים בקטגוריה זו עד היום.</div>';
 }
 document.getElementById('contentBody').innerHTML=h;
}
function toggleDay(el){const card=el.parentElement;const b=card.querySelector('.daybody');const open=b.style.display==='none';b.style.display=open?'block':'none';card.classList.toggle('open',open);}
function togFav(wn,di,li){const k=key(wn,di,li);fav.has(k)?fav.delete(k):fav.add(k);const a=document.querySelector('.screen.active').id;if(a==='screen-content')renderContent();else if(a==='screen-fav')renderFav();else if(a==='screen-search')renderSearch();}
function renderFav(){const fl=flatAll().filter(x=>fav.has(key(x.wn,x.di,x.li)));document.getElementById('favBody').innerHTML=fl.length?'<div class="listcard">'+fl.map(x=>row(x.wn,x.di,x.li,x.l,true)).join('')+'</div>':'<div class="empty">עדיין אין מועדפים.<br>סמני ❤ על שיעורים והם יופיעו כאן.</div>';}
function renderSearch(){const q=(document.getElementById('searchInput').value||'').trim();let fl=flatAll();if(q)fl=fl.filter(x=>x.l.title.indexOf(q)>=0);document.getElementById('searchBody').innerHTML=!q?'<div class="empty">הקלידי כדי לחפש בכל התוכן.</div>':(fl.length?'<div class="listcard">'+fl.map(x=>row(x.wn,x.di,x.li,x.l,true)).join('')+'</div>':'<div class="empty">לא נמצאו תוצאות.</div>');}
let curL={wn:0,di:0,li:0};
function openLesson(wn,di,li){curL={wn,di,li};renderLesson();show('lesson');}
function renderLesson(){var wn=curL.wn,di=curL.di,li=curL.li;const day=wk(wn).days[di];const l=day.lessons[li];const tp=TYPE[l.type]||TYPE.video;const k=key(wn,di,li);const done=completed.has(k);const isf=fav.has(k);
 document.getElementById('lessonTitle').textContent=l.title;
 let h='<div class="lmeta">שיעור '+(li+1)+' מתוך '+day.lessons.length+' · '+tp.l+'</div>';
 h+='<div class="lactions"><button class="fav'+(isf?' on':'')+'" onclick="togFav2()">'+svg(HEART,18)+' מועדף</button><button class="complete'+(done?' on':'')+'" onclick="togDone()">'+svg('M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z',18)+(done?' הושלם':' סמני כהושלם')+'</button></div>';
 h+='<div class="introtext"><span class="tag">טקסט מקדים · דמו</span>כאן יופיע הטקסט המקדים של ענת לשיעור זה - היא ממסגרת, מסבירה ומכינה אותך לקראת הסרטון שמתחת. הטקסט האמיתי יוזן בשלב מילוי התוכן. 🌸</div>';
 if(l.type!=='pdf'&&l.type!=='links'&&l.type!=='info')h+=videoPlayer();
 if(l.hasPdf||l.type==='pdf')h+='<div class="dl" onclick="alert(\'כאן יורד ה-PDF\')"><div class="ic">'+svg(ICON.pdf)+'</div><div><b>דף משימה</b><span>PDF · להורדה</span></div></div>';
 if(l.type==='links')h+='<div class="dl"><div class="ic">'+svg(ICON.links)+'</div><div><b>קישורים</b><span>ייפתחו בלחיצה</span></div></div>';
 let nxt=null;if(li+1<day.lessons.length)nxt={wn,di,li:li+1,l:day.lessons[li+1]};else{const nd=wk(wn).days[di+1];if(nd&&nd.lessons.length)nxt={wn,di:di+1,li:0,l:nd.lessons[0]};}
 if(nxt){const ntp=TYPE[nxt.l.type]||TYPE.video;h+='<div class="upnext"><div class="lbl">הבא בתור</div><div class="upnextcard" onclick="openLesson('+nxt.wn+','+nxt.di+','+nxt.li+')"><div class="ic" style="background:'+cv(ntp.b)+';color:'+cv(ntp.c)+'">'+svg(ICON[nxt.l.type]||ICON.video,18)+'</div><div><b>'+nxt.l.title+'</b><span>'+ntp.l+'</span></div></div></div>';}
 h+='<div class="note">סימון "הושלם" נספר בהתקדמות היומית שלך ובמדליה 💜</div>';
 document.getElementById('lessonBody').innerHTML=h;
}
const FS_SVG=svg('M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z',18);
const GEAR_SVG=svg('M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.5.5 0 00.12-.64l-1.92-3.32a.5.5 0 00-.61-.22l-2.39.96a7 7 0 00-1.62-.94l-.36-2.54a.5.5 0 00-.5-.42h-3.84a.5.5 0 00-.5.42l-.36 2.54a7 7 0 00-1.62.94l-2.39-.96a.5.5 0 00-.61.22L2.7 8.84a.5.5 0 00.12.64l2.03 1.58a7.07 7.07 0 000 1.88L2.82 14.5a.5.5 0 00-.12.64l1.92 3.32a.5.5 0 00.61.22l2.39-.96a7 7 0 001.62.94l.36 2.54a.5.5 0 00.5.42h3.84a.5.5 0 00.5-.42l.36-2.54a7 7 0 001.62-.94l2.39.96a.5.5 0 00.61-.22l1.92-3.32a.5.5 0 00-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1112 8.5a3.5 3.5 0 010 7z',18);
const CAST_SVG=svg('M21 3H3a2 2 0 00-2 2v3h2V5h18v14h-7v2h7a2 2 0 002-2V5a2 2 0 00-2-2zM1 18v3h3a3 3 0 00-3-3zm0-4v2a5 5 0 015 5h2a7 7 0 00-7-7zm0-4v2a9 9 0 019 9h2A11 11 0 001 10z',18);
const REPLAY_SVG=svg('M12 5V1L7 6l5 5V7a6 6 0 11-6 6H4a8 8 0 108-8z',30);
const FWD_SVG=svg('M12 5V1l5 5-5 5V7a6 6 0 106 6h2a8 8 0 11-8-8z',30);
const PLAY_SVG=svg('M8 5v14l11-7z',24);const PAUSE_SVG=svg('M6 5h4v14H6zM14 5h4v14h-4z',24);
function vGear(){alert('בחירת איכות: Auto · 1080p · 720p · 224p\n(אפשר להוריד איכות אם הרשת בבית חלשה ויש קפיצות)\n\nמהירות נגינה: 0.5x · 1x · 1.5x · 2x');}
function togglePlay(el){const p=el.getAttribute('data-p')==='1';el.innerHTML=p?PLAY_SVG:PAUSE_SVG;el.setAttribute('data-p',p?'0':'1');}
function videoPlayer(){return '<div class="videobox"><div class="vtop"><button onclick="alert(\'מסך מלא\')">'+FS_SVG+'</button><button onclick="vGear()">'+GEAR_SVG+'</button><button onclick="alert(\'שיתוף לטלוויזיה (Chromecast / AirPlay)\')">'+CAST_SVG+'</button></div><div class="vcenter"><div class="sk" onclick="alert(\'אחורה 5 שניות\')">'+REPLAY_SVG+'<span>5</span></div><div class="pp" data-p="0" onclick="togglePlay(this)">'+PLAY_SVG+'</div><div class="sk" onclick="alert(\'קדימה 15 שניות\')">'+FWD_SVG+'<span>15</span></div></div><div class="vbottom"><div class="vprog"><i></i><b></b></div><div class="vtime">0:00 · 2:23</div></div></div><div class="vcaps">נגן Bunny - מסך מלא · שיתוף לטלוויזיה · בחירת איכות (להורדה ברשת חלשה) · שינוי מהירות</div>';}
function togDone(){const k=key(curL.wn,curL.di,curL.li);completed.has(k)?completed.delete(k):completed.add(k);renderLesson();}
function togFav2(){const k=key(curL.wn,curL.di,curL.li);fav.has(k)?fav.delete(k):fav.add(k);renderLesson();}
buildDay();
</script></body></html>
